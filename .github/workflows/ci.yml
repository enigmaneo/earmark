name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      # Hard gate: the test suite must pass.
      - name: Run tests
        run: uv run pytest -q

      # Informational only for now — the repo has pre-existing lint/type debt.
      # Remove `continue-on-error` once the backlog is cleared to make these gates.
      - name: Lint (ruff)
        run: uv run ruff check .
        continue-on-error: true

      - name: Format check (ruff)
        run: uv run ruff format --check .
        continue-on-error: true

      - name: Type check (mypy)
        run: uv run mypy src/earmark
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hard gate: svelte-check + tsc must pass.
      - name: Type/check
        run: npm run check
