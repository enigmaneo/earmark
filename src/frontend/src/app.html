<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico?v=2" sizes="any" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png?v=2" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png?v=2" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>earmark</title>
		<meta name="description" content="Sync your Audiobookshelf and KOReader reading progress." />
		<meta name="theme-color" content="#0f0f0f" />
		<meta name="mobile-web-app-capable" content="yes" />
		<!-- iOS PWA: Safari ignores the web manifest, so standalone launch, home-screen
		     name, and status bar style are driven by these apple-specific tags. The home
		     screen icon comes from the apple-touch-icon link above. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="earmark" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<script>
			// Apply the saved theme before first paint to avoid a flash of the default.
			// Keep the known values in sync with src/lib/theme.svelte.ts.
			(function () {
				var themes = ['cerberus', 'wintry', 'crimson', 'concord', 'seafoam', 'modern', 'hamlindigo', 'reign'];
				var stored = localStorage.getItem('earmark-theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = themes.indexOf(stored) !== -1 ? stored : prefersDark ? 'cerberus' : 'wintry';
				document.documentElement.dataset.theme = theme;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
