services:
  backend:
    image: earmark-backend
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    env_file: ../.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/earmark.db
      ALIGNMENT_CACHE_DIR: /app/data/cache
    volumes:
      - earmark-data:/app/data
    restart: unless-stopped

  frontend:
    image: earmark-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    env_file: ../.env
    environment:
      BACKEND_URL: http://backend:7700
      ORIGIN: ${ORIGIN:-http://localhost:7070}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-7070}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  earmark-data:
