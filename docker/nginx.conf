events {}

http {
    upstream backend {
        server backend:7700;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;

        # Browser API calls (vite proxy equivalent: strips /api prefix)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # KOSync API for KOReader devices
        location /syncs/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /healthcheck {
            proxy_pass http://backend;
        }

        # SvelteKit frontend (all other routes)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
